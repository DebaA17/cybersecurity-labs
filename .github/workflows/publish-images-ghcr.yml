name: Build & Publish Lab Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names; GitHub may preserve username casing.
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            privesc:
              - 'labs/linux-privilege-escalation/**'
            sqli:
              - 'labs/web-exploitation-sqli/**'
            upload:
              - 'labs/web-exploitation-file-upload/**'
            idor:
              - 'labs/web-exploitation-idor/**'
            xss:
              - 'labs/web-exploitation-stored-xss-support-tickets/**'
            php:
              - 'labs/web-exploitation-php-attack-chain/**'
            ssti:
              - 'labs/web-exploitation-ssti/**'
            ssrf:
              - 'labs/web-exploitation-ssrf/**'
            jwt:
              - 'labs/web-exploitation-jwt-auth-pitfalls/**'
            cache:
              - 'labs/web-exploitation-cache-poisoning/**'
            api-mass-assignment:
              - 'labs/web-exploitation-api-mass-assignment/**'


      - name: Set image namespace (lowercase)
        shell: bash
        run: |
          echo "IMAGE_NAMESPACE_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Linux Privilege Escalation Lab (sudo misconfiguration)
      - name: Build & push privesc-sudo (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.privesc == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/linux-privilege-escalation/vulnerable
          file: labs/linux-privilege-escalation/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/privesc-sudo:vuln

      - name: Build & push privesc-sudo (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.privesc == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/linux-privilege-escalation/fixed
          file: labs/linux-privilege-escalation/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/privesc-sudo:fixed

      # Web Exploitation Lab (SQL Injection)
      - name: Build & push flask-sqli (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.sqli == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-sqli/vulnerable
          file: labs/web-exploitation-sqli/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-sqli:vuln

      - name: Build & push flask-sqli (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.sqli == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-sqli/fixed
          file: labs/web-exploitation-sqli/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-sqli:fixed

      # Web Exploitation Lab (File Upload)
      - name: Build & push flask-upload (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.upload == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-file-upload/vulnerable
          file: labs/web-exploitation-file-upload/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-upload:vuln

      - name: Build & push flask-upload (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.upload == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-file-upload/fixed
          file: labs/web-exploitation-file-upload/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-upload:fixed

      # Web Exploitation Lab (IDOR)
      - name: Build & push flask-idor (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.idor == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-idor/vulnerable
          file: labs/web-exploitation-idor/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-idor:vuln

      - name: Build & push flask-idor (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.idor == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-idor/fixed
          file: labs/web-exploitation-idor/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-idor:fixed

      # Web Exploitation Lab (Stored XSS — Support Tickets)
      - name: Build & push flask-stored-xss (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.xss == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-stored-xss-support-tickets/vulnerable
          file: labs/web-exploitation-stored-xss-support-tickets/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-stored-xss:vuln

      - name: Build & push flask-stored-xss (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.xss == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-stored-xss-support-tickets/fixed
          file: labs/web-exploitation-stored-xss-support-tickets/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-stored-xss:fixed

      # Web Exploitation Lab (PHP Attack Chain)
      - name: Build & push php-attack-chain (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.php == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-php-attack-chain/vulnerable
          file: labs/web-exploitation-php-attack-chain/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/php-attack-chain:vuln

      - name: Build & push php-attack-chain (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.php == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-php-attack-chain/fixed
          file: labs/web-exploitation-php-attack-chain/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/php-attack-chain:fixed

      # Web Exploitation Lab (SSTI)
      - name: Build & push flask-ssti (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssti == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssti/vulnerable
          file: labs/web-exploitation-ssti/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-ssti:vuln

      - name: Build & push flask-ssti (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssti == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssti/fixed
          file: labs/web-exploitation-ssti/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-ssti:fixed

      # Web Exploitation Lab (SSRF)
      - name: Build & push ssrf-app (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssrf == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssrf/vulnerable
          file: labs/web-exploitation-ssrf/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/ssrf-app:vuln

      - name: Build & push ssrf-app (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssrf == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssrf/fixed
          file: labs/web-exploitation-ssrf/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/ssrf-app:fixed

      - name: Build & push ssrf-internal-sim (latest)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssrf == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssrf/docker/internal-sim
          file: labs/web-exploitation-ssrf/docker/internal-sim/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/ssrf-internal-sim:latest

      - name: Build & push ssrf-public-sim (latest)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.ssrf == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-ssrf/docker/public-sim
          file: labs/web-exploitation-ssrf/docker/public-sim/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/ssrf-public-sim:latest

      # Web Exploitation Lab (JWT Auth Pitfalls)
      - name: Build & push jwt-auth-pitfalls (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.jwt == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-jwt-auth-pitfalls/vulnerable
          file: labs/web-exploitation-jwt-auth-pitfalls/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/jwt-auth-pitfalls:vuln

      - name: Build & push jwt-auth-pitfalls (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.jwt == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-jwt-auth-pitfalls/fixed
          file: labs/web-exploitation-jwt-auth-pitfalls/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/jwt-auth-pitfalls:fixed

      # Web Exploitation Lab (Web Cache Poisoning)
      - name: Build & push flask-cache-poisoning (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.cache == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-cache-poisoning/vulnerable
          file: labs/web-exploitation-cache-poisoning/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-cache-poisoning:vuln

      - name: Build & push flask-cache-poisoning (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.cache == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-cache-poisoning/fixed
          file: labs/web-exploitation-cache-poisoning/fixed/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/flask-cache-poisoning:fixed

      # Web Exploitation Lab (API Mass Assignment & Excessive Data Exposure)
      - name: Build & push node-api-mass-assignment (vuln)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.api-mass-assignment == 'true'
        uses: docker/build-push-action@v6
        with:
          context: labs/web-exploitation-api-mass-assignment/vulnerable
          file: labs/web-exploitation-api-mass-assignment/vulnerable/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/node-api-mass-assignment:vuln

      - name: Build & push node-api-mass-assignment (fixed)
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.api-mass-assignment == 'true'
